# Dev environment Helm values
# Single replicas, minimal resources, relaxed policies

global:
  environment: dev
  imageRegistry: ""
  imagePullSecrets: []

app:
  name: gitops-app
  component: web

replicaCount: 1

image:
  repository: nginx
  tag: "1.25.3-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: app.dev.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: APP_ENV
    value: dev
  - name: LOG_LEVEL
    value: debug
  - name: METRICS_ENABLED
    value: "true"

configMap:
  enabled: true
  data:
    APP_PORT: "80"
    APP_ENV: dev
    FEATURE_FLAGS: "all"
    DEBUG_MODE: "true"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}

# Dev-specific: no persistence needed
persistence:
  enabled: false
