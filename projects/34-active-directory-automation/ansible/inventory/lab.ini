# lab.ini — Ansible inventory for corp.contoso.local lab environment
# Update ansible_host values to match your actual network configuration
# Secrets are managed via ansible-vault (see group_vars/all/vault.yml)

# =============================================================================
# DOMAIN CONTROLLERS
# =============================================================================
[domain_controllers]
dc01.corp.contoso.local  ansible_host=192.168.10.10  dc_role=PDC  site=HQ-Site
dc02.corp.contoso.local  ansible_host=192.168.10.11  dc_role=BDC  site=HQ-Site

[domain_controllers:vars]
ansible_user=CONTOSO\svc-deploy
ansible_connection=winrm
ansible_winrm_transport=kerberos
ansible_winrm_server_cert_validation=ignore
ansible_port=5985

# =============================================================================
# LINUX SERVERS
# =============================================================================
[linux_servers]
app01.corp.contoso.local  ansible_host=192.168.20.10  server_role=application  os=rhel9
app02.corp.contoso.local  ansible_host=192.168.20.11  server_role=application  os=rhel9
web01.corp.contoso.local  ansible_host=192.168.20.20  server_role=web          os=ubuntu22
web02.corp.contoso.local  ansible_host=192.168.20.21  server_role=web          os=ubuntu22
db01.corp.contoso.local   ansible_host=192.168.20.30  server_role=database     os=rhel9
fs01.corp.contoso.local   ansible_host=192.168.20.40  server_role=fileserver   os=rhel9

[linux_servers:vars]
ansible_user=svc-deploy
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3

# =============================================================================
# WINDOWS SERVERS
# =============================================================================
[windows_servers]
app-win01.corp.contoso.local  ansible_host=192.168.20.50  server_role=application  os=ws2022
sql01.corp.contoso.local      ansible_host=192.168.20.60  server_role=database     os=ws2022
iis01.corp.contoso.local      ansible_host=192.168.20.70  server_role=web          os=ws2022

[windows_servers:vars]
ansible_user=CONTOSO\svc-deploy
ansible_connection=winrm
ansible_winrm_transport=kerberos
ansible_winrm_server_cert_validation=ignore
ansible_port=5985

# =============================================================================
# WINDOWS WORKSTATIONS
# =============================================================================
[windows_workstations]
ws001.corp.contoso.local  ansible_host=192.168.30.10  department=IT       os=win11
ws002.corp.contoso.local  ansible_host=192.168.30.11  department=IT       os=win11
ws003.corp.contoso.local  ansible_host=192.168.30.20  department=HR       os=win11
ws004.corp.contoso.local  ansible_host=192.168.30.21  department=HR       os=win11
ws005.corp.contoso.local  ansible_host=192.168.30.30  department=Finance  os=win11
ws006.corp.contoso.local  ansible_host=192.168.30.31  department=Finance  os=win11

[windows_workstations:vars]
ansible_user=CONTOSO\svc-deploy
ansible_connection=winrm
ansible_winrm_transport=kerberos
ansible_winrm_server_cert_validation=ignore
ansible_port=5985

# =============================================================================
# LOGICAL GROUPS
# =============================================================================
[windows:children]
domain_controllers
windows_servers
windows_workstations

[all_servers:children]
linux_servers
windows_servers
domain_controllers

[corp_network:children]
domain_controllers
linux_servers
windows_servers
windows_workstations

# =============================================================================
# GLOBAL VARS
# =============================================================================
[all:vars]
ad_domain=corp.contoso.local
ad_realm=CORP.CONTOSO.LOCAL
ad_netbios=CONTOSO
ntp_server=dc01.corp.contoso.local
dns_servers=192.168.10.10,192.168.10.11
syslog_server=192.168.20.10
