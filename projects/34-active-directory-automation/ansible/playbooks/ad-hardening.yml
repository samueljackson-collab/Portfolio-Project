---
# ad-hardening.yml
# Active Directory security hardening playbook
# Covers: legacy protocol disablement, audit policy enforcement,
#         fine-grained password policies, privileged account controls,
#         LDAP signing/channel binding, Kerberos armoring
#
# Target: Windows domain controllers (domain_controllers group)
#
# Usage:
#   ansible-playbook -i inventory/lab.ini playbooks/ad-hardening.yml \
#     --ask-vault-pass

- name: Active Directory Security Hardening
  hosts: domain_controllers
  gather_facts: true

  vars:
    domain_name:    "corp.contoso.local"
    domain_netbios: "CONTOSO"
    dc_admin_user:  "{{ vault_dc_admin_user }}"
    dc_admin_pass:  "{{ vault_dc_admin_pass }}"

  tasks:

    # ------------------------------------------------------------------
    # 1. Disable legacy authentication protocols
    # ------------------------------------------------------------------

    - name: "HARDENING | Disable NTLMv1 — set LmCompatibilityLevel=5"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Control\Lsa
        name:  LmCompatibilityLevel
        data:  5
        type:  dword
        state: present

    - name: "HARDENING | Disable LM hash storage"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Control\Lsa
        name:  NoLMHash
        data:  1
        type:  dword
        state: present

    - name: "HARDENING | Disable SMBv1 server"
      ansible.windows.win_powershell:
        script: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters" `
            -Name SMB1 -Value 0 -Type DWord -Force
          Write-Output "SMBv1 server disabled"

    - name: "HARDENING | Disable SMBv1 client (MRxSmb10)"
      ansible.windows.win_powershell:
        script: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\services\mrxsmb10" `
            -Name Start -Value 4 -Type DWord -Force
          Write-Output "SMBv1 client disabled"

    - name: "HARDENING | Require SMB signing on DC"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Services\LanmanServer\Parameters
        name:  RequireSecuritySignature
        data:  1
        type:  dword
        state: present

    - name: "HARDENING | Enable SMB encryption for DC shares"
      ansible.windows.win_powershell:
        script: |
          Set-SmbServerConfiguration -EncryptData $true -Force
          Write-Output "SMB encryption enabled"

    # ------------------------------------------------------------------
    # 2. LDAP security — signing and channel binding
    # ------------------------------------------------------------------

    - name: "HARDENING | Require LDAP signing (LDAPServerIntegrity=2)"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Services\NTDS\Parameters
        name:  LDAPServerIntegrity
        data:  2
        type:  dword
        state: present

    - name: "HARDENING | Enable LDAP channel binding token requirements"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Services\NTDS\Parameters
        name:  LdapEnforceChannelBinding
        data:  2
        type:  dword
        state: present

    # ------------------------------------------------------------------
    # 3. Kerberos hardening
    # ------------------------------------------------------------------

    - name: "HARDENING | Enable Kerberos armoring (FAST) via registry"
      ansible.windows.win_regedit:
        path:  HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System\Kerberos\Parameters
        name:  SupportedEncryptionTypes
        data:  2147483640
        type:  dword
        state: present

    - name: "HARDENING | Disable weak Kerberos encryption types (DES/RC4 fallback)"
      ansible.windows.win_powershell:
        script: |
          $princip = "krbtgt"
          Set-ADUser $princip -KerberosEncryptionType AES128,AES256
          Write-Output "krbtgt encryption updated to AES only"

    # ------------------------------------------------------------------
    # 4. Advanced Audit Policy Configuration
    # ------------------------------------------------------------------

    - name: "HARDENING | Enable advanced audit — Account Logon (Success+Failure)"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"Credential Validation" /success:enable /failure:enable
          auditpol /set /subcategory:"Kerberos Authentication Service" /success:enable /failure:enable
          auditpol /set /subcategory:"Kerberos Service Ticket Operations" /success:enable /failure:enable
          Write-Output "Account Logon audit configured"

    - name: "HARDENING | Enable advanced audit — Account Management"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"User Account Management" /success:enable /failure:enable
          auditpol /set /subcategory:"Security Group Management" /success:enable /failure:enable
          auditpol /set /subcategory:"Computer Account Management" /success:enable /failure:enable
          auditpol /set /subcategory:"Distribution Group Management" /success:enable /failure:enable
          Write-Output "Account Management audit configured"

    - name: "HARDENING | Enable advanced audit — Logon/Logoff"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"Logon" /success:enable /failure:enable
          auditpol /set /subcategory:"Logoff" /success:enable /failure:disable
          auditpol /set /subcategory:"Account Lockout" /success:enable /failure:enable
          auditpol /set /subcategory:"Special Logon" /success:enable /failure:disable
          Write-Output "Logon/Logoff audit configured"

    - name: "HARDENING | Enable advanced audit — Object Access"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"File System" /success:disable /failure:enable
          auditpol /set /subcategory:"Registry" /success:disable /failure:enable
          auditpol /set /subcategory:"Directory Service Access" /success:enable /failure:enable
          auditpol /set /subcategory:"Directory Service Changes" /success:enable /failure:enable
          Write-Output "Object Access audit configured"

    - name: "HARDENING | Enable advanced audit — Privilege Use"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"Sensitive Privilege Use" /success:enable /failure:enable
          Write-Output "Privilege Use audit configured"

    - name: "HARDENING | Enable advanced audit — Process Tracking"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"Process Creation" /success:enable /failure:disable
          Write-Output "Process Tracking audit configured"

    - name: "HARDENING | Enable advanced audit — Policy Change"
      ansible.windows.win_powershell:
        script: |
          auditpol /set /subcategory:"Audit Policy Change" /success:enable /failure:enable
          auditpol /set /subcategory:"Authentication Policy Change" /success:enable /failure:enable
          Write-Output "Policy Change audit configured"

    # ------------------------------------------------------------------
    # 5. Expand Windows Event Log sizes
    # ------------------------------------------------------------------

    - name: "HARDENING | Set Security log max size to 256 MB"
      ansible.windows.win_powershell:
        script: |
          wevtutil sl Security /ms:268435456
          Write-Output "Security log size set to 256 MB"

    - name: "HARDENING | Set System log max size to 64 MB"
      ansible.windows.win_powershell:
        script: |
          wevtutil sl System /ms:67108864
          Write-Output "System log size set to 64 MB"

    - name: "HARDENING | Set Application log max size to 64 MB"
      ansible.windows.win_powershell:
        script: |
          wevtutil sl Application /ms:67108864
          Write-Output "Application log size set to 64 MB"

    # ------------------------------------------------------------------
    # 6. Fine-grained password policies
    # ------------------------------------------------------------------

    - name: "HARDENING | Create IT-Admins PSO (stricter password policy)"
      ansible.windows.win_powershell:
        script: |
          $pso = Get-ADFineGrainedPasswordPolicy -Filter "Name -eq 'IT-Admins-PSO'" -ErrorAction SilentlyContinue
          if (-not $pso) {
            New-ADFineGrainedPasswordPolicy -Name "IT-Admins-PSO" `
              -Precedence 10 `
              -ComplexityEnabled $true `
              -MinPasswordLength 16 `
              -MaxPasswordAge "60.00:00:00" `
              -MinPasswordAge "1.00:00:00" `
              -PasswordHistoryCount 24 `
              -ReversibleEncryptionEnabled $false `
              -LockoutThreshold 3 `
              -LockoutDuration "01:00:00" `
              -LockoutObservationWindow "00:30:00"
            Add-ADFineGrainedPasswordPolicySubject "IT-Admins-PSO" -Subjects "IT-Admins"
            Write-Output "IT-Admins-PSO created and applied"
          } else {
            Write-Output "IT-Admins-PSO already exists"
          }

    - name: "HARDENING | Create ServiceAccounts PSO (long passwords, no expiry lockout)"
      ansible.windows.win_powershell:
        script: |
          $pso = Get-ADFineGrainedPasswordPolicy -Filter "Name -eq 'ServiceAccounts-PSO'" -ErrorAction SilentlyContinue
          if (-not $pso) {
            New-ADFineGrainedPasswordPolicy -Name "ServiceAccounts-PSO" `
              -Precedence 20 `
              -ComplexityEnabled $true `
              -MinPasswordLength 24 `
              -MaxPasswordAge "365.00:00:00" `
              -MinPasswordAge "0.00:00:00" `
              -PasswordHistoryCount 12 `
              -ReversibleEncryptionEnabled $false `
              -LockoutThreshold 0
            Add-ADFineGrainedPasswordPolicySubject "ServiceAccounts-PSO" `
              -Subjects "svc-backup","svc-monitoring","svc-deploy"
            Write-Output "ServiceAccounts-PSO created and applied"
          } else {
            Write-Output "ServiceAccounts-PSO already exists"
          }

    # ------------------------------------------------------------------
    # 7. Privileged Access — Protected Users group
    # ------------------------------------------------------------------

    - name: "HARDENING | Add IT-Admins accounts to Protected Users group"
      ansible.windows.win_powershell:
        script: |
          $members = @("jsmith", "mmartinez")
          foreach ($m in $members) {
            try {
              Add-ADGroupMember -Identity "Protected Users" -Members $m -ErrorAction Stop
              Write-Output "Added $m to Protected Users"
            } catch {
              Write-Output "Skipped $m - $($_.Exception.Message)"
            }
          }

    # ------------------------------------------------------------------
    # 8. AdminSDHolder / privileged group monitoring
    # ------------------------------------------------------------------

    - name: "HARDENING | Verify no unexpected members in Domain Admins"
      ansible.windows.win_powershell:
        script: |
          $expected = @("Administrator")
          $actual   = (Get-ADGroupMember "Domain Admins" -Recursive).SamAccountName
          $unexpected = $actual | Where-Object { $_ -notin $expected }
          if ($unexpected) {
            Write-Warning "Unexpected Domain Admins members: $($unexpected -join ', ')"
            exit 1
          } else {
            Write-Output "Domain Admins membership is clean"
          }

    # ------------------------------------------------------------------
    # 9. Disable anonymous LDAP enumeration
    # ------------------------------------------------------------------

    - name: "HARDENING | Disable anonymous LDAP binds"
      ansible.windows.win_regedit:
        path:  HKLM:\System\CurrentControlSet\Services\NTDS\Parameters
        name:  DSA Heuristics
        data:  "0000002"
        type:  string
        state: present

    # ------------------------------------------------------------------
    # 10. Enable recycle bin if not already enabled
    # ------------------------------------------------------------------

    - name: "HARDENING | Enable AD Recycle Bin"
      ansible.windows.win_powershell:
        script: |
          $feature = Get-ADOptionalFeature -Filter "Name -eq 'Recycle Bin Feature'"
          if ($feature.EnabledScopes.Count -eq 0) {
            Enable-ADOptionalFeature "Recycle Bin Feature" `
              -Scope ForestOrConfigurationSet `
              -Target "{{ domain_name }}" `
              -Confirm:$false
            Write-Output "AD Recycle Bin enabled"
          } else {
            Write-Output "AD Recycle Bin already enabled"
          }

  post_tasks:

    - name: "HARDENING | Generate hardening summary report"
      ansible.windows.win_powershell:
        script: |
          $report = @()
          $report += "=== AD Hardening Summary for {{ inventory_hostname }} ==="
          $report += "Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          $report += ""
          $report += "LmCompatibilityLevel : $((Get-ItemProperty HKLM:\System\CurrentControlSet\Control\Lsa).LmCompatibilityLevel)"
          $report += "NoLMHash             : $((Get-ItemProperty HKLM:\System\CurrentControlSet\Control\Lsa).NoLMHash)"
          $report += "LDAPServerIntegrity  : $((Get-ItemProperty 'HKLM:\System\CurrentControlSet\Services\NTDS\Parameters').LDAPServerIntegrity)"
          $report += "SMBv1 Server         : $(if ((Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters' -ErrorAction SilentlyContinue).SMB1 -eq 0) { 'DISABLED' } else { 'ENABLED' })"
          $report += ""
          $report | ForEach-Object { Write-Output $_ }
      register: hardening_summary

    - name: Display hardening summary
      ansible.builtin.debug:
        var: hardening_summary.output

  handlers:

    - name: Restart WinRM
      ansible.windows.win_service:
        name: WinRM
        state: restarted

    - name: Restart NTDS
      ansible.windows.win_service:
        name: NTDS
        state: restarted
