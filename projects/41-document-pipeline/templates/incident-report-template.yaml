document_type: incident_report
title_template: "{title}"
sections:
  - id: incident_summary
    heading: "Incident Summary"
    type: table
    columns: ["Field", "Value"]
    data_key: summary_fields
  - id: impact
    heading: "Impact Assessment"
    content_template: "{impact_description}"
  - id: timeline
    heading: "Incident Timeline"
    type: timeline_table
    columns: ["Time (UTC)", "Event", "Actor"]
    data_key: timeline
  - id: root_cause
    heading: "Root Cause Analysis"
    content_template: "{root_cause}"
  - id: contributing_factors
    heading: "Contributing Factors"
    type: list
    data_key: contributing_factors
  - id: remediation
    heading: "Immediate Remediation Actions"
    type: numbered_list
    data_key: remediation_actions
  - id: action_items
    heading: "Follow-Up Action Items"
    type: table
    columns: ["Action", "Owner", "Due Date", "Priority"]
    data_key: action_items
  - id: lessons_learned
    heading: "Lessons Learned"
    type: list
    data_key: lessons_learned
footer: "Generated by Document Pipeline v1.0 | {date}"
