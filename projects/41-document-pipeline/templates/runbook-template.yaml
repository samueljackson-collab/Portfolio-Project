document_type: runbook
title_template: "{title}"
sections:
  - id: overview
    heading: "Overview"
    content_template: "{overview}"
  - id: prerequisites
    heading: "Prerequisites"
    type: list
    data_key: prerequisites
  - id: steps
    heading: "Procedure"
    type: numbered_steps
    data_key: steps
  - id: validation
    heading: "Validation Checks"
    type: numbered_list
    data_key: validations
  - id: rollback
    heading: "Rollback Procedure"
    type: numbered_list
    data_key: rollback_steps
  - id: contacts
    heading: "Contacts & Escalation"
    type: table
    columns: ["Role", "Name", "Contact"]
    data_key: contacts
footer: "Generated by Document Pipeline v1.0 | {date}"
