filter {

  # ─────────────────────────────────────────────────────────────────────────────
  # WINDOWS EVENT LOG PARSING (via Winlogbeat / Beats input)
  # ─────────────────────────────────────────────────────────────────────────────
  if "windows" in [tags] or [type] == "wineventlog" {

    # Normalize top-level Winlogbeat fields to a consistent working set
    mutate {
      rename => {
        "[winlog][event_id]"          => "[event][id]"
        "[winlog][computer_name]"     => "[host][name]"
        "[winlog][user][name]"        => "[user][name]"
        "[winlog][user][domain]"      => "[user][domain]"
        "[winlog][event_data][SubjectUserName]"   => "[user][name]"
        "[winlog][event_data][SubjectDomainName]" => "[user][domain]"
        "[winlog][event_data][TargetUserName]"    => "[user][target_name]"
        "[winlog][event_data][TargetDomainName]"  => "[user][target_domain]"
        "[winlog][event_data][IpAddress]"         => "[source][ip]"
        "[winlog][event_data][IpPort]"            => "[source][port]"
        "[winlog][event_data][WorkstationName]"   => "[source][hostname]"
        "[winlog][event_data][LogonType]"         => "[winlog][logon_type]"
        "[winlog][event_data][ProcessName]"       => "[process][executable]"
        "[winlog][event_data][NewProcessName]"    => "[process][executable]"
        "[winlog][event_data][ProcessId]"         => "[process][pid]"
        "[winlog][event_data][NewProcessId]"      => "[process][pid]"
        "[winlog][event_data][CommandLine]"       => "[process][command_line]"
        "[winlog][event_data][ParentProcessName]" => "[process][parent][executable]"
      }
    }

    # Extract process name from full executable path
    if [process][executable] {
      grok {
        match => { "[process][executable]" => ".*[\\\/](?<[process][name]>[^\\\/]+)$" }
        tag_on_failure => []
      }
    }

    # ── Event 4624: Successful Logon ──────────────────────────────────────────
    if [event][id] == "4624" {
      mutate {
        add_field => {
          "[event][type]"     => "authentication_success"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
          "[event][severity]" => 1
          "alert.name"        => ""
          "alert.severity"    => "info"
        }
        add_tag => ["logon_success"]
      }
    }

    # ── Event 4625: Failed Logon ──────────────────────────────────────────────
    else if [event][id] == "4625" {
      mutate {
        add_field => {
          "[event][type]"     => "authentication_failure"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => 3
          "alert.name"        => "Failed Logon Attempt"
          "alert.severity"    => "medium"
        }
        add_tag => ["logon_failure", "credential_access"]
      }
    }

    # ── Event 4648: Logon With Explicit Credentials ───────────────────────────
    else if [event][id] == "4648" {
      mutate {
        add_field => {
          "[event][type]"     => "authentication_explicit"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "unknown"
          "[event][severity]" => 2
          "alert.name"        => "Explicit Credential Logon"
          "alert.severity"    => "low"
        }
        add_tag => ["explicit_logon"]
      }
    }

    # ── Event 4688: Process Creation ──────────────────────────────────────────
    else if [event][id] == "4688" {
      mutate {
        add_field => {
          "[event][type]"     => "process_start"
          "[event][category]" => "process"
          "[event][outcome]"  => "success"
          "[event][severity]" => 1
          "alert.name"        => ""
          "alert.severity"    => "info"
        }
        add_tag => ["process_creation"]
      }

      # Flag suspicious process names indicative of lateral movement tools
      if [process][name] =~ /(?i)(psexec|wmic|powershell|cmd|mshta|rundll32|regsvr32|certutil|bitsadmin|wscript|cscript)/ {
        mutate {
          add_field  => { "alert.name" => "Suspicious Process Execution" }
          replace    => { "alert.severity" => "medium" }
          replace    => { "[event][severity]" => 2 }
          add_tag    => ["suspicious_process"]
        }
      }
    }

    # ── Event 4720: User Account Created ──────────────────────────────────────
    else if [event][id] == "4720" {
      mutate {
        add_field => {
          "[event][type]"     => "user_created"
          "[event][category]" => "iam"
          "[event][outcome]"  => "success"
          "[event][severity]" => 3
          "alert.name"        => "New User Account Created"
          "alert.severity"    => "medium"
        }
        add_tag => ["user_management", "persistence"]
      }
    }

    # ── Event 4728: Member Added to Security-Enabled Global Group ─────────────
    else if [event][id] == "4728" {
      mutate {
        add_field => {
          "[event][type]"     => "group_member_added"
          "[event][category]" => "iam"
          "[event][outcome]"  => "success"
          "[event][severity]" => 4
          "alert.name"        => "User Added to Security Group"
          "alert.severity"    => "high"
        }
        add_tag => ["group_modification", "privilege_escalation"]
      }

      # Escalate if the target group is a built-in admin group
      if [winlog][event_data][TargetUserName] =~ /(?i)(domain admins|administrators|enterprise admins|schema admins)/ {
        mutate {
          replace => { "alert.name"        => "Admin Group Membership Change" }
          replace => { "alert.severity"    => "critical" }
          replace => { "[event][severity]" => 5 }
          add_tag => ["admin_group_change"]
        }
      }
    }

    # ── Event 4672: Special Privileges Assigned at Logon ──────────────────────
    else if [event][id] == "4672" {
      mutate {
        add_field => {
          "[event][type]"     => "special_logon"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
          "[event][severity]" => 3
          "alert.name"        => "Special Privileges Logon"
          "alert.severity"    => "medium"
        }
        add_tag => ["special_logon", "privilege_use"]
      }
    }

    # ── Event 4740: Account Lockout ───────────────────────────────────────────
    else if [event][id] == "4740" {
      mutate {
        add_field => {
          "[event][type]"     => "account_lockout"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => 4
          "alert.name"        => "Account Locked Out"
          "alert.severity"    => "high"
        }
        add_tag => ["lockout", "brute_force_indicator"]
      }
    }

    # ── Event 7045: New Service Installed (lateral movement indicator) ─────────
    else if [event][id] == "7045" {
      mutate {
        add_field => {
          "[event][type]"     => "service_installed"
          "[event][category]" => "configuration"
          "[event][outcome]"  => "success"
          "[event][severity]" => 4
          "alert.name"        => "New Service Installed"
          "alert.severity"    => "high"
        }
        add_tag => ["service_creation", "lateral_movement_indicator"]
      }
    }

    # ── Default Windows event (unhandled Event ID) ────────────────────────────
    else {
      mutate {
        add_field => {
          "[event][type]"     => "windows_event"
          "[event][category]" => "host"
          "[event][severity]" => 1
          "alert.severity"    => "info"
        }
      }
    }

  }  # end windows block


  # ─────────────────────────────────────────────────────────────────────────────
  # LINUX SYSLOG / AUTH.LOG PARSING
  # ─────────────────────────────────────────────────────────────────────────────
  if "linux" in [tags] or [type] == "syslog" {

    # SSH successful authentication
    if [message] =~ /sshd.*Accepted/ {
      grok {
        match => {
          "message" => "Accepted %{WORD:[ssh][auth_method]} for %{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:integer} ssh2"
        }
        tag_on_failure => ["_sshd_parse_failure"]
      }
      mutate {
        add_field => {
          "[event][type]"     => "authentication_success"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
          "[event][severity]" => 1
          "alert.severity"    => "info"
          "[event][id]"       => "ssh_auth_success"
        }
        add_tag => ["ssh", "logon_success"]
      }
    }

    # SSH failed authentication
    else if [message] =~ /sshd.*Failed/ {
      grok {
        match => {
          "message" => "Failed %{WORD:[ssh][auth_method]} for %{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:integer} ssh2"
        }
        tag_on_failure => []
      }
      grok {
        match => {
          "message" => "Failed %{WORD:[ssh][auth_method]} for invalid user %{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:integer} ssh2"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][type]"     => "authentication_failure"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => 3
          "alert.name"        => "SSH Login Failure"
          "alert.severity"    => "medium"
          "[event][id]"       => "ssh_auth_failure"
        }
        add_tag => ["ssh", "logon_failure", "credential_access"]
      }
    }

    # SSH invalid user
    else if [message] =~ /sshd.*Invalid user/ {
      grok {
        match => {
          "message" => "Invalid user %{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:integer}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][type]"     => "authentication_failure"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => 3
          "alert.name"        => "SSH Invalid User"
          "alert.severity"    => "medium"
          "[event][id]"       => "ssh_invalid_user"
        }
        add_tag => ["ssh", "logon_failure", "invalid_user"]
      }
    }

    # sudo command execution
    else if [message] =~ /sudo:/ {
      grok {
        match => {
          "message" => "%{USERNAME:[user][name]} : TTY=%{DATA:[sudo][tty]} ; PWD=%{DATA:[sudo][cwd]} ; USER=%{USERNAME:[sudo][run_as_user]} ; COMMAND=%{GREEDYDATA:[process][command_line]}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][type]"     => "sudo_execution"
          "[event][category]" => "process"
          "[event][outcome]"  => "success"
          "[event][severity]" => 2
          "alert.severity"    => "low"
          "[event][id]"       => "sudo_exec"
        }
        add_tag => ["sudo", "privilege_use"]
      }
    }

    # su (switch user) attempts
    else if [message] =~ /su:/ {
      grok {
        match => {
          "message" => "su: pam_unix.*session (opened|closed) for user %{USERNAME:[user][target_name]}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][type]"     => "su_session"
          "[event][category]" => "authentication"
          "[event][severity]" => 2
          "alert.severity"    => "low"
          "[event][id]"       => "su_session"
        }
        add_tag => ["su", "privilege_use"]
      }
    }

    # PAM authentication failure (catch-all for other services)
    else if [message] =~ /pam_unix.*auth.*failure/ {
      grok {
        match => {
          "message" => "pam_unix\\(%{DATA:[pam][service]}:auth\\): authentication failure.*user=%{USERNAME:[user][name]}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[event][type]"     => "authentication_failure"
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => 2
          "alert.severity"    => "medium"
          "[event][id]"       => "pam_auth_failure"
        }
        add_tag => ["pam", "logon_failure"]
      }
    }

    # Parse syslog timestamp and hostname if not already done
    if ![host][name] and [logsource] {
      mutate { rename => { "logsource" => "[host][name]" } }
    }

  }  # end linux block


  # ─────────────────────────────────────────────────────────────────────────────
  # NETWORK FLOW EVENTS
  # ─────────────────────────────────────────────────────────────────────────────
  if "network-flows" in [tags] or [type] == "netflow" {

    mutate {
      add_field => {
        "[event][type]"     => "network_connection"
        "[event][category]" => "network"
        "[event][severity]" => 1
        "alert.severity"    => "info"
      }
    }

    # Flag large outbound transfers (> 100 MB) as potential exfiltration
    if [network][bytes] and [network][direction] == "outbound" {
      ruby {
        code => "
          bytes = event.get('[network][bytes]').to_i
          if bytes > 104857600
            event.set('alert.name', 'Large Outbound Data Transfer')
            event.set('alert.severity', 'high')
            event.set('[event][severity]', 4)
            event.tag('data_exfiltration_indicator')
          end
        "
      }
    }

  }  # end network block


  # ─────────────────────────────────────────────────────────────────────────────
  # GEOIP ENRICHMENT
  # ─────────────────────────────────────────────────────────────────────────────
  if [source][ip] and [source][ip] != "-" and [source][ip] != "" {
    # Skip RFC1918 private ranges — only geo-lookup public IPs
    if [source][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.|::1$|fe80:)/ {
      geoip {
        source        => "[source][ip]"
        target        => "geoip"
        add_field     => { "[source][geo][country_name]" => "%{[geoip][country_name]}" }
        add_field     => { "[source][geo][city_name]"    => "%{[geoip][city_name]}" }
        fields        => ["city_name", "country_name", "country_code2", "location", "region_name", "autonomous_system_number", "autonomous_system_organization"]
        tag_on_failure => ["_geoip_lookup_failure"]
      }

      # Flag logins from high-risk countries (example list)
      if [geoip][country_code2] in ["KP", "IR", "RU", "CN"] {
        mutate {
          add_tag  => ["high_risk_country"]
          add_field => { "threat.indicator.country" => "%{[geoip][country_name]}" }
        }
        if [event][severity] {
          ruby {
            code => "
              sev = event.get('[event][severity]').to_i
              event.set('[event][severity]', [sev + 1, 5].min)
            "
          }
        }
      }
    }
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # ECS FIELD NORMALIZATION
  # ─────────────────────────────────────────────────────────────────────────────

  # Ensure @timestamp is set from various source fields
  if ![timestamp] and [event_time] {
    date {
      match    => ["event_time", "ISO8601", "yyyy-MM-dd HH:mm:ss", "UNIX"]
      target   => "@timestamp"
      timezone => "UTC"
    }
  }

  # Coerce numeric fields
  if [source][port] and [source][port] != "" {
    mutate { convert => { "[source][port]" => "integer" } }
  }
  if [dest][port] and [dest][port] != "" {
    mutate { convert => { "[dest][port]" => "integer" } }
  }
  if [process][pid] and [process][pid] != "" {
    mutate { convert => { "[process][pid]" => "integer" } }
  }

  # Set ECS ecs.version
  mutate {
    add_field => {
      "[ecs][version]" => "8.11.0"
      "[event][module]" => "siem"
    }
  }

  # Ensure host.ip is set when source is a beats agent
  if [beat][hostname] and ![host][name] {
    mutate { rename => { "[beat][hostname]" => "[host][name]" } }
  }

  # Lowercase usernames for consistent matching
  if [user][name] {
    mutate { lowercase => ["[user][name]"] }
  }

  # Sanitize empty / dash placeholders to remove noise
  mutate {
    gsub => [
      "[source][ip]",  "^-$", "",
      "[user][name]",  "^-$", "",
      "[user][domain]","^-$", ""
    ]
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # SEVERITY TAGGING (human-readable label alongside integer)
  # ─────────────────────────────────────────────────────────────────────────────
  if ![event][severity] {
    mutate { add_field => { "[event][severity]" => 1 } }
  }

  ruby {
    code => "
      sev = event.get('[event][severity]').to_i
      label = case sev
              when 5 then 'critical'
              when 4 then 'high'
              when 3 then 'medium'
              when 2 then 'low'
              else        'info'
              end
      event.set('[event][severity_label]', label)
    "
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # DROP UNNEEDED / NOISY FIELDS
  # ─────────────────────────────────────────────────────────────────────────────
  mutate {
    remove_field => [
      "beat",
      "prospector",
      "input",
      "offset",
      "[log][offset]",
      "[agent][ephemeral_id]",
      "[winlog][api]",
      "[winlog][event_data][SubjectLogonId]",
      "[winlog][event_data][TargetLogonId]",
      "[winlog][event_data][LogonGuid]",
      "[winlog][event_data][TransmittedServices]",
      "[winlog][event_data][LmPackageName]",
      "[winlog][event_data][KeyLength]",
      "[winlog][record_id]",
      "[winlog][keywords]",
      "[winlog][opcode]",
      "event_data",
      "xml"
    ]
  }

}
