# 01-input.conf
# Logstash input configuration for SIEM pipeline
# Sources: syslog (UDP+TCP), Beats, Winlogbeat, file tailing, Kafka, HTTP webhook
# All inputs tag events with their source type for downstream routing

# ============================================================================
# SYSLOG — UDP (standard syslog from network devices, Linux hosts)
# ============================================================================
input {
  udp {
    port  => 5514
    codec => plain { charset => "UTF-8" }
    type  => "syslog"
    tags  => ["syslog", "udp", "linux"]
    add_field => {
      "input_source" => "syslog_udp"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# SYSLOG — TCP (reliable delivery from high-value systems)
# ============================================================================
input {
  tcp {
    port  => 5515
    codec => plain { charset => "UTF-8" }
    type  => "syslog"
    tags  => ["syslog", "tcp", "linux"]
    add_field => {
      "input_source" => "syslog_tcp"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# BEATS — Filebeat, Auditbeat, Packetbeat (TLS-authenticated)
# ============================================================================
input {
  beats {
    port => 5044
    ssl  => true
    ssl_certificate                   => "/etc/logstash/certs/logstash.crt"
    ssl_key                           => "/etc/logstash/certs/logstash.key"
    ssl_certificate_authorities       => ["/etc/logstash/certs/ca.crt"]
    ssl_verify_mode                   => "force_peer"
    include_codec_tag                 => true
    add_field => {
      "input_source" => "beats"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# BEATS — Winlogbeat (Windows Event Logs — dedicated port for volume control)
# ============================================================================
input {
  beats {
    port => 5045
    ssl  => true
    ssl_certificate                   => "/etc/logstash/certs/logstash.crt"
    ssl_key                           => "/etc/logstash/certs/logstash.key"
    ssl_certificate_authorities       => ["/etc/logstash/certs/ca.crt"]
    ssl_verify_mode                   => "force_peer"
    tags => ["windows", "winlogbeat"]
    add_field => {
      "input_source" => "winlogbeat"
      "pipeline"     => "siem"
      "log_type"     => "windows_event"
    }
  }
}

# ============================================================================
# FILE — Local log files (dev/lab or log replay)
# ============================================================================
input {
  file {
    path              => [
      "/var/log/auth.log",
      "/var/log/secure",
      "/var/log/syslog",
      "/var/log/audit/audit.log"
    ]
    start_position    => "beginning"
    sincedb_path      => "/var/lib/logstash/.sincedb_local_files"
    stat_interval     => "1 second"
    discover_interval => 15
    type              => "syslog"
    tags              => ["file", "local", "linux"]
    add_field => {
      "input_source" => "file_local"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# FILE — Windows Event Log JSONL export files (lab replay / offline analysis)
# ============================================================================
input {
  file {
    path           => ["/data/logs/windows/*.jsonl", "/data/logs/windows/*.json"]
    start_position => "beginning"
    codec          => "json"
    sincedb_path   => "/var/lib/logstash/.sincedb_windows_files"
    type           => "windows_event"
    tags           => ["file", "windows", "json"]
    add_field => {
      "input_source" => "file_windows"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# FILE — Network flow logs (NetFlow / sFlow JSON export)
# ============================================================================
input {
  file {
    path           => ["/data/logs/netflow/*.json"]
    start_position => "beginning"
    codec          => "json"
    sincedb_path   => "/var/lib/logstash/.sincedb_netflow"
    type           => "netflow"
    tags           => ["netflow", "network"]
    add_field => {
      "input_source" => "file_netflow"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# KAFKA — High-throughput event bus for distributed log collection
# ============================================================================
input {
  kafka {
    bootstrap_servers    => "kafka01:9092,kafka02:9092,kafka03:9092"
    topics               => [
      "security-events",
      "windows-events",
      "linux-syslog",
      "network-flows",
      "endpoint-telemetry"
    ]
    group_id             => "logstash-siem-consumer"
    consumer_threads     => 4
    codec                => "json"
    auto_offset_reset    => "earliest"
    session_timeout_ms   => "30000"
    security_protocol    => "SASL_SSL"
    sasl_mechanism       => "PLAIN"
    jaas_config          => "org.apache.kafka.common.security.plain.PlainLoginModule required username='logstash' password='${KAFKA_PASSWORD}';"
    ssl_truststore_location => "/etc/logstash/certs/kafka.truststore.jks"
    ssl_truststore_password => "${KAFKA_TRUSTSTORE_PASSWORD}"
    tags                 => ["kafka"]
    add_field => {
      "input_source" => "kafka"
      "pipeline"     => "siem"
    }
  }
}

# ============================================================================
# HTTP — Webhook receiver (cloud services, SaaS push integrations)
# ============================================================================
input {
  http {
    port  => 8080
    codec => "json"
    response_headers => {
      "Content-Type" => "application/json"
    }
    tags => ["webhook", "http"]
    add_field => {
      "input_source" => "http_webhook"
      "pipeline"     => "siem"
    }
  }
}
