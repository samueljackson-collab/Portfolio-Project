output {

  # ─────────────────────────────────────────────────────────────────────────────
  # PRIMARY: Elasticsearch (all events)
  # ─────────────────────────────────────────────────────────────────────────────
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "security-events-%{+YYYY.MM.dd}"
    # Use the write alias once ILM is bootstrapped:
    # action => "create"
    # index  => "security-events"
    pipeline => "security-events-ingest"

    # Retry behaviour
    retry_max_interval => 32
    retry_initial_interval => 2

    # ECS compatibility
    ecs_compatibility => "v8"

    # Document ID derived from event fingerprint to deduplicate replays
    document_id => "%{[@metadata][fingerprint]}"
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # HIGH-SEVERITY ALERT FILE (severity >= 4 = high / critical)
  # ─────────────────────────────────────────────────────────────────────────────
  if [event][severity] and [event][severity] >= 4 {
    file {
      path  => "/var/log/logstash/alerts/high-severity-%{+YYYY-MM-dd}.jsonl"
      codec => json_lines
    }
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # CRITICAL ALERTS: also forward to a dedicated Kafka topic for SOAR integration
  # ─────────────────────────────────────────────────────────────────────────────
  if [event][severity] and [event][severity] >= 5 {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id          => "siem-critical-alerts"
      codec             => json
    }
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # BRUTE FORCE INDICATOR: dedicated index for correlation queries
  # ─────────────────────────────────────────────────────────────────────────────
  if "brute_force_indicator" in [tags] or "logon_failure" in [tags] {
    elasticsearch {
      hosts  => ["http://elasticsearch:9200"]
      index  => "siem-auth-failures-%{+YYYY.MM.dd}"
      ecs_compatibility => "v8"
    }
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # NETWORK FLOW INDEX (separate for retention / ILM policy)
  # ─────────────────────────────────────────────────────────────────────────────
  if [event][category] == "network" {
    elasticsearch {
      hosts  => ["http://elasticsearch:9200"]
      index  => "siem-network-flows-%{+YYYY.MM.dd}"
      ecs_compatibility => "v8"
    }
  }


  # ─────────────────────────────────────────────────────────────────────────────
  # DEBUG OUTPUT (disable in production — set LOG_LEVEL=info)
  # ─────────────────────────────────────────────────────────────────────────────
  if [@metadata][debug] == "true" {
    stdout {
      codec => rubydebug
    }
  }

}
