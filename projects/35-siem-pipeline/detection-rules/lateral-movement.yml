title: Lateral Movement via PsExec Remote Service Creation
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
description: >
  Detects lateral movement using PsExec or similar remote execution tools.
  The rule correlates a new service installation (Event 7045) on a target host with
  a Type 3 (Network) logon (Event 4624) originating from a non-standard source within
  a short time window. PsExec copies its executable to the target system and registers
  it as a temporary service, making this combination a reliable indicator of
  PsExec-style remote execution.
author: Sam Jackson
date: 2025/11/22
modified: 2026/01/10
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1570/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/psexec
logsource:
  product: windows
  service: system
detection:
  service_creation:
    EventID: 7045
    ServiceFileName|contains:
      - 'PSEXESVC'
      - 'psexec'
      - 'ADMIN$'
    ServiceType: 'user mode service'
  network_logon:
    EventID: 4624
    LogonType: '3'
    AuthenticationPackageName: 'NTLM'
    TargetUserName|not_contains:
      - 'ANONYMOUS LOGON'
      - '$'
  filter_domain_controllers:
    ComputerName|contains:
      - 'DC0'
      - 'DC1'
      - '-DC-'
  timeframe: 5m
  condition: (service_creation and network_logon) and not filter_domain_controllers | near IpAddress
falsepositives:
  - Legitimate remote administration using PsExec by authorized IT staff during change windows
  - Backup and monitoring agents that create temporary services
  - Software deployment tools (SCCM, Ansible) that use SMB for distribution
level: high
tags:
  - attack.lateral_movement
  - attack.t1021
  - attack.t1021.002
  - attack.t1570
  - attack.execution
  - attack.t1569
  - attack.t1569.002
fields:
  - EventID
  - ServiceName
  - ServiceFileName
  - AccountName
  - IpAddress
  - Computer
  - LogonType
  - AuthenticationPackageName
