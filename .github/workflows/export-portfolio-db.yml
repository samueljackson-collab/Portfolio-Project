name: Export Portfolio Database

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/**'
      - 'projects-new/**'
      - 'portfolio-metrics.json'
      - 'scripts/create_portfolio_db.py'
      - 'scripts/export_portfolio.py'
  workflow_dispatch:
    inputs:
      skip_wiki:
        description: 'Skip Wiki.js export preparation'
        required: false
        default: 'false'
        type: boolean
      skip_summaries:
        description: 'Skip per-project SUMMARY.md generation'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  export-portfolio-db:
    name: Build Portfolio SQLite DB & Export
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run portfolio export orchestrator
        run: |
          python scripts/export_portfolio.py \
            --root . \
            --db portfolio.db \
            ${{ github.event.inputs.skip_wiki == 'true' && '--skip-wiki' || '' }} \
            ${{ github.event.inputs.skip_summaries == 'true' && '--skip-summaries' || '' }}

      - name: Verify database
        run: |
          echo "=== Database Info ==="
          ls -lh portfolio.db
          echo ""
          echo "=== Project Count ==="
          sqlite3 portfolio.db "SELECT COUNT(*) || ' projects' FROM projects;"
          echo ""
          echo "=== Top Projects by Completion ==="
          sqlite3 portfolio.db \
            "SELECT printf('%-50s %3d%%', name, completion_pct) FROM projects ORDER BY completion_pct DESC LIMIT 10;"
          echo ""
          echo "=== Portfolio Summary ==="
          sqlite3 portfolio.db \
            "SELECT printf('%-40s %s', key, value) FROM portfolio_summary ORDER BY key;"

      - name: Upload portfolio.db as artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-database-${{ github.sha }}
          path: portfolio.db
          retention-days: 90

      - name: Upload wiki-export as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-export-${{ github.sha }}
          path: wiki-export/
          retention-days: 30
          if-no-files-found: warn

      - name: Commit updated files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add portfolio-metrics.json PORTFOLIO_INDEX.md portfolio.db || true
          git add projects/**/SUMMARY.md projects-new/**/SUMMARY.md 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh portfolio DB and metrics [skip ci]

            - Updated portfolio-metrics.json with latest filesystem scan
            - Regenerated portfolio.db SQLite database
            - Updated PORTFOLIO_INDEX.md
            - Generated missing SUMMARY.md files

            Generated by: export-portfolio-db workflow"
            git push origin HEAD
          fi

  validate-exports:
    name: Validate Export Artifacts
    runs-on: ubuntu-latest
    needs: export-portfolio-db
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download portfolio database
        uses: actions/download-artifact@v4
        with:
          name: portfolio-database-${{ github.sha }}

      - name: Validate database integrity
        run: |
          echo "=== SQLite Integrity Check ==="
          sqlite3 portfolio.db "PRAGMA integrity_check;"

          echo ""
          echo "=== Table Counts ==="
          for table in projects project_languages project_files documentation wiki_pages github_metadata infrastructure completion_tracker portfolio_summary; do
            count=$(sqlite3 portfolio.db "SELECT COUNT(*) FROM $table;")
            echo "  $table: $count rows"
          done

          echo ""
          echo "=== Language Distribution ==="
          sqlite3 portfolio.db \
            "SELECT language, COUNT(*) as projects FROM project_languages GROUP BY language ORDER BY projects DESC LIMIT 10;"

          echo ""
          echo "=== Infrastructure Summary ==="
          sqlite3 portfolio.db \
            "SELECT
              SUM(has_docker) || ' projects with Docker',
              SUM(has_terraform) || ' projects with Terraform',
              SUM(has_kubernetes) || ' projects with Kubernetes'
            FROM infrastructure;"

      - name: Generate DB report
        run: |
          cat << 'EOF' > db-report.txt
          === Portfolio Database Report ===
          Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          Projects:
          EOF

          sqlite3 portfolio.db \
            "SELECT '  ' || name || ' [' || completion_pct || '%] - ' ||
                    CASE WHEN has_code THEN 'code ' ELSE '' END ||
                    CASE WHEN has_docs THEN 'docs ' ELSE '' END ||
                    CASE WHEN has_tests THEN 'tests' ELSE '' END
             FROM projects ORDER BY completion_pct DESC, name;" >> db-report.txt

          cat db-report.txt

      - name: Upload DB report
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-db-report-${{ github.sha }}
          path: db-report.txt
          retention-days: 30
